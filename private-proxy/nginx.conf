events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Include MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # Private proxy server configuration
    server {
        listen 8080;
        server_name _;

        # Preserve original request information from public proxy
        set_real_ip_from 172.16.0.0/12;  # Docker private network range
        real_ip_header X-Real-IP;
        real_ip_recursive on;

        # Default backend for demonstration (can be replaced with actual services)
        location / {
            # For demonstration, return information about the request
            add_header Content-Type application/json;
            return 200 '{
                "message": "Request processed by private proxy",
                "method": "$request_method",
                "uri": "$request_uri",
                "remote_addr": "$remote_addr",
                "real_ip": "$realip_remote_addr",
                "forwarded_for": "$http_x_forwarded_for",
                "host": "$http_host",
                "user_agent": "$http_user_agent",
                "timestamp": "$time_iso8601"
            }';
        }

        # Example: Forward to another service (uncomment and modify as needed)
        # location /api/ {
        #     proxy_pass http://backend-service:3000/;
        #     proxy_set_header Host $host;
        #     proxy_set_header X-Real-IP $remote_addr;
        #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        #     proxy_set_header X-Forwarded-Proto $scheme;
        # }

        # Health check endpoint
        location /health {
            access_log off;
            return 200 "Private proxy is healthy\n";
            add_header Content-Type text/plain;
        }

        # Echo endpoint for testing request preservation
        location /echo {
            add_header Content-Type application/json;
            return 200 '{
                "echo": "Request received by private proxy",
                "method": "$request_method",
                "uri": "$request_uri",
                "args": "$args",
                "headers": {
                    "host": "$http_host",
                    "user_agent": "$http_user_agent",
                    "x_real_ip": "$http_x_real_ip",
                    "x_forwarded_for": "$http_x_forwarded_for",
                    "x_forwarded_proto": "$http_x_forwarded_proto",
                    "x_forwarded_host": "$http_x_forwarded_host",
                    "content_type": "$http_content_type",
                    "custom_header": "$http_custom_header"
                },
                "client_info": {
                    "remote_addr": "$remote_addr",
                    "real_ip": "$realip_remote_addr"
                },
                "timestamp": "$time_iso8601"
            }';
        }
    }
}